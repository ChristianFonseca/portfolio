services:
  portfolio-web:
    build: .
    container_name: portfolio-web
    restart: unless-stopped
    env_file: .env
    environment:
      UPLOADS_DIR: /data/uploads
    ports: ["127.0.0.1:8001:3000"]
    volumes:
      - /var/lib/portfolio/uploads:/data/uploads
    networks: [portfolio-net, pg-shared]

networks:
  portfolio-net: { name: portfolio-net }
  pg-shared: { external: true }
